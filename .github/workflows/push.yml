name: Release & Docker Push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to push"
        required: false
        default: "latest"

jobs:
  format-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prettier:check

  release:
    name: Semantic Release
    if: github.event_name == 'push'
    needs: format-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push-web:
    name: Docker Push (Web)
    needs: release
    if: needs.release.outputs.new-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            BUILD_VERSION=${{ needs.release.outputs.version }}
          tags: |
            ${{ vars.DOCKER_IMAGE_WEB }}:latest
            ${{ vars.DOCKER_IMAGE_WEB }}:${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  docker-push-socket:
    name: Docker Push (Socket)
    needs: release
    if: needs.release.outputs.new-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/socket/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_SOCKETIO }}:latest
            ${{ vars.DOCKER_IMAGE_SOCKETIO }}:${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=socket
          cache-to: type=gha,mode=max,scope=socket

  docker-force-push:
    name: Docker Force Push
    if: github.event_name == 'workflow_dispatch'
    needs: format-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ vars.DOCKER_IMAGE_WEB }}:${{ inputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - name: Build and push socket
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/socket/Dockerfile
          push: true
          tags: ${{ vars.DOCKER_IMAGE_SOCKETIO }}:${{ inputs.tag }}
          cache-from: type=gha,scope=socket
          cache-to: type=gha,mode=max,scope=socket

  deploy-vps:
    name: Deploy to VPS
    needs: [docker-push-web, docker-push-socket, docker-force-push]
    if: always() && (needs.docker-push-web.result == 'success' || needs.docker-force-push.result == 'success')
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Make .ssh folder
        run: mkdir -p ~/.ssh
      - name: Write SSH private key
        run: echo '${{ secrets.GILGAMESH_SSH_PRIVATE_KEY }}' > ~/.ssh/id_rsa
      - name: Set permissions for SSH private key
        run: chmod 400 ~/.ssh/id_rsa
      - name: SSH into server
        run: ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.GILGAMESH_SSH_USER }}@${{ secrets.GILGAMESH_SSH_HOST }} ${{ vars.SSH_COMMAND }}
