services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: draw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        BUILD_VERSION: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WEB_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/draw
      WEB_AUTH_SECRET: ${WEB_AUTH_SECRET:-change-this-to-a-random-secret}
      WEB_AUTH_URL: ${WEB_AUTH_URL:-http://localhost:3000}
      WEB_SMTP_HOST: ${WEB_SMTP_HOST}
      WEB_SMTP_USERNAME: ${WEB_SMTP_USERNAME}
      WEB_SMTP_PASSWORD: ${WEB_SMTP_PASSWORD}
      WEB_SMTP_MAIL_FROM: ${WEB_SMTP_MAIL_FROM}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  socket:
    build:
      context: .
      dockerfile: apps/socket/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      SOCKET_PORT: "3001"
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:3000}
      SOCKET_AUTH_URL: ${SOCKET_AUTH_URL:-http://web:3000}

volumes:
  pgdata:
